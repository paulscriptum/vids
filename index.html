<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Video Background</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video id="staticVideo" class="video-bg active" autoplay loop muted playsinline>
    <source src="static.mp4" type="video/mp4">
  </video>

  <video id="movingVideo" class="video-bg" autoplay loop muted playsinline>
    <source src="moving copy.mp4" type="video/mp4">
  </video>

  <script src="script.js"></script>
</body>
</html>
